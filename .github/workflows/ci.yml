name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref so a rapid push sequence doesn't
# pile up redundant jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Compatibility shim for the Node20->Node24 JS-action runtime transition.
  # Kept deliberately; dropping it is a clean follow-up once we bump the
  # actions/* majors to versions that declare node24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet root module
        run: go vet ./...
      - name: Vet Go SDK
        working-directory: sdk/akg-go
        run: go vet ./...
      - name: Install Go analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Staticcheck root module
        run: staticcheck ./...
      - name: Staticcheck Go SDK
        working-directory: sdk/akg-go
        run: staticcheck ./...
      - name: Govulncheck root module
        run: govulncheck ./...
      - name: Govulncheck Go SDK
        working-directory: sdk/akg-go
        run: govulncheck ./...

  go:
    name: Go (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22 = go.mod floor (consumer reach); 1.26 = current dev toolchain.
        go: ['1.22', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          # Both modules are dependency-free (no go.sum), so module caching
          # has nothing to cache; leaving it off avoids a spurious warning.
          cache: false
      - name: Test root package
        run: go test -count=1 ./...
      - name: Generate Go SDK docs graph
        working-directory: sdk/akg-go
        run: go run ./cmd/akg-go gen-docs
      - name: Check docs graph freshness
        working-directory: sdk/akg-go
        run: git diff --exit-code docs/
      - name: Build Go SDK
        working-directory: sdk/akg-go
        run: go build ./...
      - name: Test Go SDK
        working-directory: sdk/akg-go
        run: go test -count=1 ./...

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/akg-ts/package-lock.json
      - name: Install dependencies
        working-directory: sdk/akg-ts
        run: npm ci
      - name: Build
        working-directory: sdk/akg-ts
        run: npm run build
      - name: Check docs graph freshness
        working-directory: sdk/akg-ts
        run: |
          npm run generate:docs
          git diff --exit-code docs/
      - name: Test
        working-directory: sdk/akg-ts
        run: npm test
      - name: Type check
        working-directory: sdk/akg-ts
        run: npx tsc --noEmit

  # First-class gate for the correctness contract (testdata/conformance +
  # testdata/behavior parity fixtures). These tests also run inside the broader
  # Go/TypeScript jobs; this surfaces them as one named, required check.
  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/akg-ts/package-lock.json
      - name: Root conformance + parity
        run: go test -run "TestConformance|TestMilestone2|TestStoreOpenToleratesUnknownStructurallyValidSection|TestCommitAppendByteParity|TestCommitDoesNotRematerializeData" ./internal/format ./internal/store
      - name: Go SDK conformance + parity
        working-directory: sdk/akg-go
        run: go test -run "^TestConformance$|^TestBehaviorParity$|^TestCommitAppendByteParity$|^TestCommitDoesNotRematerializeData$" .
      - name: Install TS dependencies
        working-directory: sdk/akg-ts
        run: npm ci
      - name: TypeScript conformance + parity
        working-directory: sdk/akg-ts
        run: npx vitest run test/conformance.test.ts test/behavior_parity.test.ts test/commit_parity.test.ts
